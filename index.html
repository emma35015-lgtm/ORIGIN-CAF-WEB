<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Café Origin — Landing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Bowlby+One+SC&family=Boldonse&family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="src/shop.css">
<link rel="stylesheet" href="src/landing-a.css">

<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    color: #2A1A14;
    background: #D88B70;
  }
  #root {
    position: relative;
    min-height: 100vh;
    width: 100%;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/tweaks-panel.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/shop.jsx"></script>
<script type="text/babel" src="src/landing-a.jsx"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  // Tweakable defaults
  const TWEAK_DEFAULTS = {
    "typePairId": "bagel",
    "heroA": "marquee"
  };

  const TYPE_PAIRS = {
    bagel: {
      label: 'Bagel × Space Grotesk',
      display: '"Bagel Fat One", "Bowlby One SC", system-ui, sans-serif',
      body: '"Space Grotesk", system-ui, sans-serif',
    },
    bowlby: {
      label: 'Bowlby × Instrument',
      display: '"Bowlby One SC", "Bagel Fat One", system-ui, sans-serif',
      body: '"Instrument Sans", system-ui, sans-serif',
    },
    boldonse: {
      label: 'Boldonse × Bricolage',
      display: '"Boldonse", "Bowlby One SC", system-ui, sans-serif',
      body: '"Bricolage Grotesque", system-ui, sans-serif',
    },
    anton: {
      label: 'Anton × Space',
      display: '"Anton", "Bowlby One SC", system-ui, sans-serif',
      body: '"Space Grotesk", system-ui, sans-serif',
    },
  };

  const HERO_OPTIONS = [
    { value: 'photo', label: 'Foto' },
    { value: 'marquee', label: 'Marquee' },
    { value: 'jumbo', label: 'Manifiesto' },
  ];

  function App() {
    const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
    const pair = TYPE_PAIRS[tweaks.typePairId] || TYPE_PAIRS.bagel;
    const sharedTweaks = {
      typePair: pair,
      heroA: tweaks.heroA,
    };

    return (
      <React.Fragment>
        <window.LandingA tweaks={sharedTweaks} />

        <window.TweaksPanel title="Tweaks · Origin">
          <window.TweakSection label="Tipografía display">
            <window.TweakSelect
              label="Type pairing"
              value={tweaks.typePairId}
              options={Object.entries(TYPE_PAIRS).map(([k, v]) => ({ value: k, label: v.label }))}
              onChange={(v) => setTweak('typePairId', v)}
            />
            <div style={{
              display: 'grid',
              gap: 6,
              marginTop: 10,
              padding: 14,
              background: 'rgba(0,0,0,0.04)',
              borderRadius: 8
            }}>
              <span style={{
                fontFamily: pair.display,
                fontSize: 38,
                lineHeight: 0.9,
                letterSpacing: '-0.02em',
                color: '#2A1A14',
              }}>ORIGIN.</span>
              <span style={{ fontFamily: pair.body, fontSize: 12, opacity: 0.7 }}>
                The f*king true origin · {pair.label}
              </span>
            </div>
          </window.TweakSection>

          <window.TweakSection label="Variantes de hero">
            <window.TweakRadio
              label="Layout"
              value={tweaks.heroA}
              options={HERO_OPTIONS}
              onChange={(v) => setTweak('heroA', v)}
            />
          </window.TweakSection>
        </window.TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
